name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test + audit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']
    steps:
      - uses: actions/checkout@v4
      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (node:test, no browser needed)
        run: npm test
      - name: Dependency audit
        run: npm audit --audit-level=high

  fixtures:
    name: fixture gate + mutation kill-rate (real browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium chromium-headless-shell
      - name: Fixture gate — recall 5/5 on buggy-shop, 100/100 + 0 false positives on shop-fixed
        run: npm run test:fixtures
      - name: Calibration — precision/recall gate (Truth Protocol, earned not asserted)
        run: npm run benchmark
      - name: Mutation kill-rate — every re-introduced defect must be caught
        run: npm run test:mutation
