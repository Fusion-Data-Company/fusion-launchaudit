<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch Audit Report — Fusion LaunchAudit</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.svg" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #101828; --soft: #475467; --faint: #98a2b3; --line: #e4e7ec;
        --blue: #2563eb; --green: #067647; --green-bg: #ecfdf3;
        --red: #b42318; --red-bg: #fef3f2; --amber: #93370d; --amber-bg: #fffaeb;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: #f8fafc; color: var(--ink); font-family: Inter, system-ui, sans-serif; }
      .sheet { max-width: 860px; margin: 0 auto; background: #fff; min-height: 100vh; padding: 56px 64px; }
      h1, h2 { font-family: "Space Grotesk", Inter, sans-serif; letter-spacing: -0.02em; margin: 0; }
      h1 { font-size: 28px; }
      h2 { font-size: 17px; margin: 36px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--ink); }
      .masthead { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--ink); padding-bottom: 20px; }
      .brand { display: flex; gap: 10px; align-items: center; }
      .brand-mark { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, #2563eb, #e11d48); color: #fff; display: grid; place-items: center; font-weight: 700; font-family: "Space Grotesk", sans-serif; }
      .meta { color: var(--soft); font-size: 13px; text-align: right; line-height: 1.7; }
      .headline { margin-top: 28px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
      .score { font-family: "Space Grotesk", sans-serif; font-size: 54px; font-weight: 700; line-height: 1; }
      .score small { font-size: 20px; color: var(--faint); font-weight: 600; }
      .sub { color: var(--soft); font-size: 14px; margin-top: 8px; line-height: 1.6; }
      .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 24px; }
      .tile { border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
      .tile b { display: block; color: var(--faint); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; }
      .tile strong { display: block; margin-top: 6px; font-size: 22px; font-family: "Space Grotesk", sans-serif; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th { text-align: left; color: var(--faint); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px; border-bottom: 1px solid var(--line); }
      td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: top; line-height: 1.5; }
      .pill { display: inline-block; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
      .pill.passed { background: var(--green-bg); color: var(--green); }
      .pill.failed { background: var(--red-bg); color: var(--red); }
      .pill.blocked, .pill.ready { background: var(--amber-bg); color: var(--amber); }
      .finding { border: 1px solid var(--line); border-left: 4px solid var(--red); border-radius: 8px; padding: 14px; margin-top: 10px; }
      .finding h3 { margin: 0 0 6px; font-size: 14px; }
      .finding p { margin: 0; color: var(--soft); font-size: 13px; line-height: 1.6; }
      .evidence { color: var(--faint); font-size: 11.5px; margin-top: 8px; font-family: ui-monospace, monospace; overflow-wrap: anywhere; }
      .note { background: var(--amber-bg); border: 1px solid #fedf89; color: var(--amber); border-radius: 10px; padding: 14px; font-size: 13px; line-height: 1.6; margin-top: 12px; }
      .foot { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--line); color: var(--faint); font-size: 11.5px; display: flex; justify-content: space-between; }
      .print-btn { position: fixed; right: 24px; top: 24px; border: none; border-radius: 10px; background: var(--blue); color: #fff; font: inherit; font-weight: 700; padding: 12px 18px; cursor: pointer; box-shadow: 0 8px 24px -8px rgba(37,99,235,.6); }
      .loading { padding: 80px; text-align: center; color: var(--faint); }
      @media print {
        body { background: #fff; }
        .sheet { padding: 24px 8px; }
        .print-btn { display: none; }
      }
      @media (max-width: 720px) { .sheet { padding: 28px 20px; } .tiles { grid-template-columns: repeat(2, 1fr); } }
    </style>
  </head>
  <body>
    <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
    <div class="sheet" id="sheet"><div class="loading">Building report…</div></div>
    <script src="/assets/report.js"></script>
  </body>
</html>
